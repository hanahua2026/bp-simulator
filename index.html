<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO3/BO5/BO7全局角色BP模拟器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== 房间面板 ========== -->
<div class="room-panel" id="roomPanel">
    <div class="room-card">
        <h2>小花牌BP模拟器</h2>
        <p class="room-subtitle">在线联机对战模式</p>
        <div class="room-buttons">
            <button id="createRoomBtn" class="room-btn room-btn-create">创建房间（裁判）</button>
            <button id="joinRoomBtn" class="room-btn room-btn-join">加入房间</button>
        </div>
        <div class="room-form" id="createForm" style="display:none;">
            <h3>创建房间 - 裁判端</h3>
            <p style="color:#e2c868;font-size:14px;">点击生成邀请码，发给对方即可</p>
            <button id="genInviteBtn" class="room-btn room-btn-create">生成邀请码</button>
            <div id="inviteCodeBox" style="display:none;margin-top:15px;">
                <p style="color:#9ba0b0;">复制下面的邀请码发给对方：</p>
                <textarea id="inviteCodeText" readonly style="width:100%;height:80px;background:#1a1c2a;color:#e2c868;border:1px solid #2a2d3d;border-radius:8px;padding:10px;font-size:12px;resize:none;"></textarea>
                <button id="copyInviteBtn" class="room-btn room-btn-create" style="margin-top:10px;">复制邀请码</button>
            </div>
            <p id="waitingMsg" style="color:#e2c868;margin-top:10px;display:none;">等待对方连接...</p>
            <button id="cancelCreateBtn" class="room-btn room-btn-cancel" style="margin-top:10px;">取消</button>
        </div>
        <div class="room-form" id="joinForm" style="display:none;">
            <h3>加入房间</h3>
            <label>粘贴邀请码：</label>
            <textarea id="inviteInput" placeholder="粘贴对方发来的邀请码" style="width:100%;height:80px;background:#1a1c2a;color:#e8eaed;border:1px solid #2a2d3d;border-radius:8px;padding:10px;font-size:12px;resize:none;"></textarea>
            <div class="role-select" style="margin-top:12px;">
                <label>选择阵营：</label>
                <button id="selectBlue" class="side-btn side-blue">蓝方</button>
                <button id="selectRed" class="side-btn side-red">红方</button>
                <button id="selectSpectator" class="side-btn side-spec">观众</button>
            </div>
            <p id="joinRoleText">未选择阵营</p>
            <button id="confirmJoinBtn" class="room-btn room-btn-join" disabled>确认加入</button>
            <button id="cancelJoinBtn" class="room-btn room-btn-cancel">取消</button>
        </div>
        <p id="roomMsg"></p>
    </div>
</div>

<!-- ========== 主界面 ========== -->
<div class="container" id="mainContainer" style="display:none;">
    <div class="top-bar">
        <div class="hana-watermark">HANA</div>
        <div class="select-box">
            <label>赛制选择：</label>
            <select id="matchSelect">
                <option value="">请选择BO3/BO5/BO7</option>
                <option value="bo3">BO3（最多3局，角色全局锁定）</option>
                <option value="bo5">BO5（最多5局，角色全局锁定）</option>
                <option value="bo7">BO7（最多7局，角色全局锁定）</option>
            </select>
        </div>
        <button id="startBtn">开启本轮对局BP</button>
        <button id="resetAllBtn">全部重置整轮系列赛</button>
        <div class="stage-info">
            当前大阶段：<span id="mainStage">等待选择赛制</span>
            &nbsp;&nbsp;当前对局：第<span id="roundNum">0</span>局
            &nbsp;&nbsp;当前操作：<span id="stepInfo">无</span>
            &nbsp;&nbsp;剩余时间：<span id="timerText">30</span>秒
        </div>
        <div class="stage-info" id="roleDisplay"></div>
    </div>
    <div class="main-box">
        <div class="col blue-col" id="blueCol">
            <div class="ban-area"><h4>蓝方禁用角色</h4><div class="ban-wrap" id="blueRoleBan"></div></div>
            <div class="pick-area"><h4>蓝方出战角色</h4><div class="pick-list" id="bluePickList"></div></div>
            <div class="tl-area"><h4>蓝方援护</h4><div class="tl-wrap" id="blueSupport"></div></div>
        </div>
        <div class="center-col">
            <div class="center-scroll">
                <h3 id="poolTitle"></h3>
                <div class="pool-wrap" id="centerPool"></div>
            </div>
            <div class="confirm-box"><button id="confirmSelectBtn" disabled>确认选择</button></div>
        </div>
        <div class="col red-col" id="redCol">
            <div class="ban-area"><h4>红方禁用角色</h4><div class="ban-wrap" id="redRoleBan"></div></div>
            <div class="pick-area"><h4>红方出战角色</h4><div class="pick-list" id="redPickList"></div></div>
            <div class="tl-area"><h4>红方援护</h4><div class="tl-wrap" id="redSupport"></div></div>
        </div>
    </div>
    <audio id="banAudio" src="sound/ban.mp3" preload="auto"></audio>
    <audio id="pickAudio" src="sound/pick.mp3" preload="auto"></audio>
</div>

<script src="config.js"></script>
<script src="main.js"></script>
</body>
</html>

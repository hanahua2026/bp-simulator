<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>BO3/BO5全局角色BP模拟器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== 房间面板 ========== -->
<div class="room-panel" id="roomPanel">
    <div class="room-card">
        <h2>小花牌BP模拟器</h2>
        <p class="room-subtitle">在线联机对战模式</p>
        <div class="room-buttons">
            <button id="createRoomBtn" class="room-btn room-btn-create">创建房间</button>
            <button id="joinRoomBtn" class="room-btn room-btn-join">加入房间</button>
        </div>
        <div class="room-form" id="createForm" style="display:none;">
            <h3>创建房间 - 裁判端</h3>
            <label>设置房间密码：</label>
            <input type="text" id="createPassword" placeholder="输入密码" maxlength="10">
            <button id="confirmCreateBtn" class="room-btn room-btn-create">确认创建</button>
            <button id="cancelCreateBtn" class="room-btn room-btn-cancel">取消</button>
        </div>
        <div class="room-form" id="joinForm" style="display:none;">
            <h3>加入房间</h3>
            <label>房间ID：</label>
            <input type="text" id="joinRoomId" placeholder="输入房间ID" maxlength="20">
            <label>房间密码：</label>
            <input type="text" id="joinPassword" placeholder="输入密码" maxlength="10">
            <div class="role-select">
                <label>选择阵营：</label>
                <button id="selectBlue" class="side-btn side-blue">蓝方</button>
                <button id="selectRed" class="side-btn side-red">红方</button>
            </div>
            <p id="joinRoleText">未选择阵营</p>
            <button id="confirmJoinBtn" class="room-btn room-btn-join" disabled>确认加入</button>
            <button id="cancelJoinBtn" class="room-btn room-btn-cancel">取消</button>
        </div>
        <div class="room-info" id="roomInfo" style="display:none;">
            <p>房间ID：<span id="displayRoomId"></span></p>
            <p>密码：<span id="displayPassword"></span></p>
            <p>蓝方：<span id="blueStatus">等待加入</span></p>
            <p>红方：<span id="redStatus">等待加入</span></p>
        </div>
        <p id="roomMsg"></p>
    </div>
</div>

<!-- ========== 主界面 ========== -->
<div class="container" id="mainContainer" style="display:none;">
    <div class="top-bar">
        <div class="hana-watermark">HANA</div>
        <div class="select-box">
            <label>赛制选择：</label>
            <select id="matchSelect">
                <option value="">请选择BO3/BO5</option>
                <option value="bo3">BO3（最多3局，角色全局锁定）</option>
                <option value="bo5">BO5（最多5局，角色全局锁定）</option>
            </select>
        </div>
        <button id="startBtn">开启本轮对局BP</button>
        <button id="resetAllBtn">全部重置整轮系列赛</button>
        <div class="stage-info">
            当前大阶段：<span id="mainStage">等待选择赛制</span>
            &nbsp;&nbsp;当前对局：第<span id="roundNum">0</span>局
            &nbsp;&nbsp;当前操作：<span id="stepInfo">无</span>
            &nbsp;&nbsp;剩余时间：<span id="timerText">20</span>秒
        </div>
        <div class="stage-info" id="roleDisplay"></div>
    </div>
    <div class="main-box">
        <div class="col blue-col" id="blueCol">
            <div class="ban-area">
                <h4>蓝方禁用角色</h4>
                <div class="ban-wrap" id="blueRoleBan"></div>
            </div>
            <div class="pick-area">
                <h4>蓝方出战角色</h4>
                <div class="pick-list" id="bluePickList"></div>
            </div>
            <div class="tl-area">
                <h4>蓝方援护</h4>
                <div class="tl-wrap" id="blueSupport"></div>
            </div>
        </div>
        <div class="center-col">
            <div class="center-scroll">
                <h3 id="poolTitle"></h3>
                <div class="pool-wrap" id="centerPool"></div>
            </div>
            <div class="confirm-box">
                <button id="confirmSelectBtn" disabled>确认选择</button>
            </div>
        </div>
        <div class="col red-col" id="redCol">
            <div class="ban-area">
                <h4>红方禁用角色</h4>
                <div class="ban-wrap" id="redRoleBan"></div>
            </div>
            <div class="pick-area">
                <h4>红方出战角色</h4>
                <div class="pick-list" id="redPickList"></div>
            </div>
            <div class="tl-area">
                <h4>红方援护</h4>
                <div class="tl-wrap" id="redSupport"></div>
            </div>
        </div>
    </div>
    <audio id="banAudio" src="sound/ban.mp3" preload="auto"></audio>
    <audio id="pickAudio" src="sound/pick.mp3" preload="auto"></audio>
</div>

<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<script src="config.js"></script>
<script src="main.js"></script>
</body>
</html>
